.qr-heading{font-size:16px;font-weight:700;color:#333;margin-bottom:4px;}

#qr-canvas{border-radius:8px;margin-bottom:14px;}
.qr-dl{padding:10px 22px;background:#4CAF50;color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;margin:4px;}

<body>

<h2>Digital Tipsrunda</h2>

<div class="section">
  <input id="title" placeholder="Titel på tipsrundan" oninput="updateData()">
</div>

<div id="questions"></div>

<button onclick="addStep()">➕ Lägg till fråga</button>

<div class="tool-row">

  <div class="tool-btn" onclick="downloadHTML()">
    <div class="icon">📄</div>

  </div>

  <div class="tool-btn" onclick="exportJSON()">
    <div class="icon">⬇️</div>
    <div class="label">Ladda ner JSON</div>
  </div>

  <div class="tool-btn" onclick="importJSON()">
    <div class="icon">⬆️</div>
    <div class="label">Ladda upp JSON</div>
  </div>

  <div class="tool-btn" onclick="createLink()">
    <div class="icon">🔗</div>
    <div class="label">Skapa länk</div>
  </div>

    <div class="icon">🖨️</div>

  </div>

</div>

<br>

<button onclick="generatePreview()">▶️ Generera preview</button>

<div id="preview" class="section"></div>

<script>

let quizData = { title:"", questions:[] };

let stream = null;
let audioCtx = null;
let recProcessor = null;
let recSource = null;
let recSilent = null;
let recBuffers = [];
let recSampleRate = 44100;
let recordingIndex = -1;

/* ===== UPLOAD VIA VERCEL ===== */
async function uploadFile(path, content, repo) {
  const res = await fetch(
    "https://upload-api-kappa.vercel.app/api/upload",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path, content, repo })
    }
  );
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "Upload failed");
  return data;
}

/* ===== CLICK FEEDBACK ===== */
function clickFeedback(){
  try{
    const audio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=");
    audio.volume = 0.2;
    audio.play();
  }catch(e){}
}

document.addEventListener("click", e=>{
  if(e.target.tagName === "BUTTON" || e.target.closest(".tool-btn")){
    clickFeedback();
  }
});

/* ===== CREATE LINK ===== */
async function createLink(){

  updateData();

  const hasContent = quizData.questions.some(s => s.text || s.img || s.audio);

  if(!quizData.title && !hasContent){
    alert("Checklistan är tom.");
    return;
  }

  document.getElementById('link-spinner').classList.add('on');

  const id = Date.now();
  const basePath = "checklist-" + id;
  const repo = "Sukrutaraj/checklist-pages";

  try {

    // Upload images and build questions array with imgUrl
    const uploadedQuestions = [];
    for(let i = 0; i < quizData.questions.length; i++){
      const s = quizData.questions[i];
      if(!s.text && !s.answer1) continue;
      let imgUrl = "";
      if(s.img){
        const imgName = basePath + "-img-" + i + ".jpg";
        await uploadFile(imgName, s.img.split(",")[1], repo);
        await new Promise(r=>setTimeout(r,300));
        imgUrl = "https://sukrutaraj.github.io/checklist-pages/" + imgName;
      }
      let audioUrl = "";
      if(s.audio){
        // Behåll inspelningens format (webm/mp4/ogg) för bästa uppspelning
        const mime = (s.audio.match(/^data:audio\/([a-z0-9.+-]+)/i) || [])[1] || "webm";
        let ext = "webm";
        if(mime.indexOf("mp4") >= 0 || mime.indexOf("mpeg") >= 0 || mime.indexOf("aac") >= 0) ext = "mp4";
        else if(mime.indexOf("ogg") >= 0) ext = "ogg";
        else if(mime.indexOf("wav") >= 0) ext = "wav";
        const audioName = basePath + "-audio-" + i + "." + ext;
        await uploadFile(audioName, s.audio.split(",")[1], repo);
        await new Promise(r=>setTimeout(r,300));
        audioUrl = "https://sukrutaraj.github.io/checklist-pages/" + audioName;
      }
      uploadedQuestions.push({
        text:     s.text    || "",
        answer1:  s.answer1 || "",
        answerX:  s.answerX || "",
        answer2:  s.answer2 || "",
        correct:  s.correct || "1",
        imgUrl:   imgUrl,
        audioUrl: audioUrl
      });
    }

    const safeTitle = quizData.title.replace(/</g,"&lt;").replace(/>/g,"&gt;");

    // CSS för quiz-sidan
    const css = [
      "body{font-family:sans-serif;background:#f5f5f5;text-align:center;padding:20px;max-width:800px;margin:auto;}",
      ".card{background:white;padding:25px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.08);}",
      "h1{font-size:22px;margin-bottom:4px;}",
      "#counter{font-size:14px;color:#888;margin-bottom:16px;}",
      "#question h2{font-size:19px;margin-bottom:8px;}",
      "#question img{max-width:100%;max-height:200px;border-radius:12px;margin:8px auto;display:block;}",
      ".ans-btn{display:block;width:100%;padding:16px;margin-top:12px;border:none;border-radius:14px;background:#eee;font-size:17px;cursor:pointer;transition:background 0.2s;text-align:left;}",
      ".ans-btn.correct{background:#4CAF50;color:white;font-weight:bold;}",
      ".ans-btn.wrong{background:#f44336;color:white;}",
      ".ans-btn.reveal{background:#e8f5e9;color:#2e7d32;font-weight:bold;}",
      ".feedback{margin-top:16px;font-size:22px;font-weight:bold;min-height:28px;}",
      ".feedback.ok{color:#4CAF50;}",
      ".feedback.fail{color:#f44336;}",
      ".next-btn{margin-top:16px;padding:14px 32px;background:#1976D2;color:white;border:none;border-radius:50px;font-size:16px;cursor:pointer;display:none;}",
      ".progress{height:6px;background:#eee;border-radius:3px;margin-bottom:20px;}",
      ".progress-bar{height:6px;background:#4CAF50;border-radius:3px;transition:width 0.4s;}",
      ".result-emoji{font-size:60px;margin:16px 0;}"
    ].join("\n");

    // Frågorna bäddas in säkert som JSON
    const questionsJson = JSON.stringify(uploadedQuestions).replace(/<\/script>/g, "<\\/script>");
    const titleJson = JSON.stringify(quizData.title || "Tipsrunda");

    // JavaScript för quiz-sidan (spelaren)
    const scriptLines = `
var questions = ${questionsJson};
var quizTitle = ${titleJson};
var current = 0, points = 0, answered = false;
document.getElementById('quiz-title').textContent = quizTitle;

function renderQuestion(){
  answered = false;
  var fb = document.getElementById('feedback');
  fb.textContent = '';
  fb.className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  var q = questions[current];
  var pct = Math.round((current / questions.length) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('counter').textContent = 'Fråga ' + (current + 1) + ' av ' + questions.length;
  var qHtml = '<h2>' + q.text + '</h2>';
  if(q.imgUrl){ qHtml += '<img src="' + q.imgUrl + '" alt="frågebild">'; }
  if(q.audioUrl){ qHtml += '<audio controls preload="metadata" src="' + q.audioUrl + '" style="width:100%;margin-top:10px;">Din webbläsare kan inte spela upp ljudet.</audio>'; }
  document.getElementById('question').innerHTML = qHtml;
  var btns = [
    {val:'1', label:'1. ' + q.answer1},
    {val:'X', label:'X. ' + q.answerX},
    {val:'2', label:'2. ' + q.answer2}
  ];
  var ans = document.getElementById('answers');
  ans.innerHTML = '';
  btns.forEach(function(b){
    var btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.id = 'btn-' + b.val;
    btn.textContent = b.label;
    btn.onclick = function(){ checkAnswer(b.val); };
    ans.appendChild(btn);
  });
}

function checkAnswer(a){
  if(answered) return;
  answered = true;
  var q = questions[current];
  var isRight = (a === q.correct);
  if(isRight) points++;
  var cb = document.getElementById('btn-' + a);
  if(cb) cb.className = 'ans-btn ' + (isRight ? 'correct' : 'wrong');
  if(!isRight){
    var rb = document.getElementById('btn-' + q.correct);
    if(rb) rb.className = 'ans-btn reveal';
  }
  var fb = document.getElementById('feedback');
  fb.textContent = isRight ? '✅ Rätt!' : '❌ Fel!';
  fb.className = 'feedback ' + (isRight ? 'ok' : 'fail');
  var nb = document.getElementById('next-btn');
  nb.style.display = 'inline-block';
  nb.textContent = (current >= questions.length - 1) ? 'Se resultat →' : 'Nästa fråga →';
}

function nextQuestion(){
  current++;
  if(current >= questions.length){ showResult(); }
  else { renderQuestion(); }
}

function showResult(){
  var pct = Math.round((points / questions.length) * 100);
  var emoji = pct === 100 ? '🏆' : pct >= 70 ? '🎉' : pct >= 40 ? '👍' : '💪';
  document.querySelector('.card').innerHTML =
    '<div class="result-emoji">' + emoji + '</div>' +
    '<h1>Klart!</h1>' +
    '<h2>' + points + ' av ' + questions.length + ' rätt</h2>' +
    '<p style="color:#888;font-size:14px;">' + pct + '% rätt</p>' +
    '<button class="next-btn" style="display:inline-block;background:#1976D2;" onclick="location.reload()">Spela igen 🔄</button>';
}

renderQuestion();
`;

    // Bygg den delade HTML-sidan med säker strängsammansättning
    const sharedHtml = [
      "<!DOCTYPE html>",
      "<html lang='sv'>",
      "<head>",
      "<meta charset='UTF-8'>",
      "<meta name='viewport' content='width=device-width, initial-scale=1.0'>",
      "<title>" + safeTitle + "</title>",
      "<style>", css, "</style>",
      "</head>",
      "<body>",
      "<div class='card'>",
      "<h1 id='quiz-title'></h1>",
      "<div class='progress'><div class='progress-bar' id='prog-bar' style='width:0%'></div></div>",
      "<div id='counter'></div>",
      "<div id='question'></div>",
      "<div id='answers'></div>",
      "<div class='feedback' id='feedback'></div>",
      "<button class='next-btn' id='next-btn' onclick='nextQuestion()'>Nästa fråga →</button>",
      "</div>",
      "<script>",
      scriptLines,
      "<" + "/script>",
      "</body>",
      "</html>"
    ].join("\n");

    const htmlName = basePath + ".html";

    await uploadFile(
      htmlName,
      btoa(unescape(encodeURIComponent(sharedHtml))),
      repo
    );

    const url = "https://sukrutaraj.github.io/checklist-pages/" + htmlName;

    let copied = false;
    try{ await navigator.clipboard.writeText(url); copied = true; }catch(e){}

    document.getElementById('link-spinner').classList.remove('on');
    document.getElementById('qr-copied').textContent = copied ? '✔ Länken är kopierad till urklipp' : '⚠️ Kopiera länken manuellt';
    document.getElementById('qr-copied').style.color = copied ? '#4CAF50' : '#e67e22';
    showQR(url, quizData.title || 'Länk skapad');

  }catch(err){
    document.getElementById('link-spinner').classList.remove('on');
    alert("Fel: " + err.message);
  }
}

/* ===== DATA ===== */
function updateData(){
  quizData.title = document.getElementById("title").value;
}

/* ===== MIC ===== */
async function initMic(){
  if(!stream){
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }
}

/* ===== RENDER ===== */
function render(){
  const container=document.getElementById("questions");
  container.innerHTML="";

  quizData.questions.forEach((question,i)=>{

    const div=document.createElement("div");
    div.className="section question";

    div.innerHTML=`
      <b>Fråga ${i+1}</b><br>

      <input value="${question.text||''}" placeholder="Skriv frågan"
      oninput="quizData.questions[${i}].text=this.value">

      <input value="${question.answer1||''}" placeholder="Svar 1"
      oninput="quizData.questions[${i}].answer1=this.value">

      <input value="${question.answerX||''}" placeholder="Svar X"
      oninput="quizData.questions[${i}].answerX=this.value">

      <input value="${question.answer2||''}" placeholder="Svar 2"
      oninput="quizData.questions[${i}].answer2=this.value">

      <select onchange="quizData.questions[${i}].correct=this.value">
      <option value="1" ${question.correct==="1"?"selected":""}>1</option>
      <option value="X" ${question.correct==="X"?"selected":""}>X</option>
      <option value="2" ${question.correct==="2"?"selected":""}>2</option>
      </select>

      <br>

      <div>
        📷 <input type="file" onchange="loadImage(event,${i})">
      </div>

      ${question.img ? `<img src="${question.img}">` : ''}

      <div style="margin-top:8px;">
        <button class="smallBtn" id="rec-btn-${i}" onclick="toggleRec(${i})">🎤 Spela in</button>
        <button class="smallBtn" onclick="playRec(${i})" ${!question.audio ? 'disabled style="opacity:0.4"' : ''}>▶️ Lyssna</button>
        ${question.audio ? `<button class="smallBtn" onclick="quizData.questions[${i}].audio='';render()" style="color:#c00">🗑</button>` : ''}
      </div>
      ${question.audio
        ? '<span style="font-size:11px;color:#4CAF50;display:block;margin-top:4px">✔ Ljud inspelat</span>'
        : '<span style="font-size:11px;color:#999;display:block;margin-top:4px">Inget ljud</span>'
      }

      <br>

      <div>
        <button class="smallBtn" onclick="moveUp(${i})">🔼</button>
        <button class="smallBtn" onclick="moveDown(${i})">🔽</button>
        <button class="smallBtn" onclick="removeStep(${i})">🗑</button>
      </div>
    `;

    container.appendChild(div);
  });
}

/* ===== STEG ===== */
function addStep(){
  quizData.questions.push({text:"",img:"",audio:"",answer1:"",answerX:"",answer2:"",correct:"1"});
  render();
}

function removeStep(i){
  quizData.questions.splice(i,1);
  render();
}

function moveUp(i){
  if(i === 0) return;
  const temp = quizData.questions[i];
  quizData.questions[i] = quizData.questions[i-1];
  quizData.questions[i-1] = temp;
  render();
}

function moveDown(i){
  if(i === quizData.questions.length - 1) return;
  const temp = quizData.questions[i];
  quizData.questions[i] = quizData.questions[i+1];
  quizData.questions[i+1] = temp;
  render();
}

/* ===== IMAGE (komprimering) ===== */
function loadImage(e,i){
  const file = e.target.files[0];
  if(!file) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = function(event){
    img.onload = function(){
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const maxWidth = 600;
      let width = img.width, height = img.height;
      if(width > maxWidth){ const scale = maxWidth/width; width = maxWidth; height = height*scale; }
      canvas.width = width; canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob(function(blob){
        const reader2 = new FileReader();
        reader2.onload = function(){ quizData.questions[i].img = reader2.result; render(); };
        reader2.readAsDataURL(blob);
      }, "image/jpeg", 0.6);
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
}

/* ===== RECORD (WAV – fungerar på iPhone, iPad och Android) ===== */
function toggleRec(i){
  if(recordingIndex === i){
    stopRec();
  } else if(recordingIndex >= 0){
    stopRec();
    startRec(i);
  } else {
    startRec(i);
  }
}

async function startRec(i){
  try{
    // AudioContext måste skapas/återupptas vid ett knapptryck (krav på iOS)
    if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    if(audioCtx.state === "suspended"){ await audioCtx.resume(); }
    await initMic();

    recSampleRate = audioCtx.sampleRate;
    recBuffers = [];
    recSource = audioCtx.createMediaStreamSource(stream);
    recProcessor = audioCtx.createScriptProcessor(4096, 1, 1);
    recProcessor.onaudioprocess = function(e){
      recBuffers.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };
    // Tyst gren så att inspelningen inte hörs i högtalaren (undviker rundgång)
    recSilent = audioCtx.createGain();
    recSilent.gain.value = 0;
    recSource.connect(recProcessor);
    recProcessor.connect(recSilent);
    recSilent.connect(audioCtx.destination);

    recordingIndex = i;
    const btn = document.getElementById("rec-btn-" + i);
    if(btn){ btn.textContent = "⏹ Stoppa"; btn.style.background = "#ffcccc"; }
  }catch(err){
    recordingIndex = -1;
    alert("Kunde inte starta inspelning: " + err.message);
  }
}

function stopRec(){
  const i = recordingIndex;
  recordingIndex = -1;
  try{
    if(recProcessor){ recProcessor.onaudioprocess = null; recProcessor.disconnect(); }
    if(recSource){ recSource.disconnect(); }
    if(recSilent){ recSilent.disconnect(); }
  }catch(e){}
  if(i < 0) return;

  // Slå ihop alla PCM-bitar
  let total = 0;
  for(const b of recBuffers){ total += b.length; }
  const pcm = new Float32Array(total);
  let off = 0;
  for(const b of recBuffers){ pcm.set(b, off); off += b.length; }

  // Nedsampla till 16 kHz mono för mindre filstorlek (räcker för tal)
  const targetRate = 16000;
  const down = downsamplePCM(pcm, recSampleRate, targetRate);
  const wavBytes = encodeWAV(down, targetRate);
  quizData.questions[i].audio = "data:audio/wav;base64," + base64FromBytes(wavBytes);
  render();
}

function downsamplePCM(buffer, inRate, outRate){
  if(outRate >= inRate) return buffer;
  const ratio = inRate / outRate;
  const newLen = Math.round(buffer.length / ratio);
  const result = new Float32Array(newLen);
  for(let i=0;i<newLen;i++){
    const start = Math.round(i*ratio);
    const end = Math.round((i+1)*ratio);
    let sum=0, count=0;
    for(let j=start;j<end && j<buffer.length;j++){ sum+=buffer[j]; count++; }
    result[i] = count ? sum/count : (buffer[Math.min(start,buffer.length-1)] || 0);
  }
  return result;
}

function encodeWAV(samples, sampleRate){
  const bytesPerSample = 2;
  const buffer = new ArrayBuffer(44 + samples.length*bytesPerSample);
  const view = new DataView(buffer);
  function writeStr(o,s){ for(let k=0;k<s.length;k++) view.setUint8(o+k, s.charCodeAt(k)); }
  writeStr(0,"RIFF");
  view.setUint32(4, 36 + samples.length*bytesPerSample, true);
  writeStr(8,"WAVE");
  writeStr(12,"fmt ");
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);              // PCM
  view.setUint16(22,1,true);              // 1 kanal (mono)
  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*bytesPerSample,true);
  view.setUint16(32,bytesPerSample,true);
  view.setUint16(34,16,true);             // 16 bitar
  writeStr(36,"data");
  view.setUint32(40,samples.length*bytesPerSample,true);
  let o=44;
  for(let i=0;i<samples.length;i++,o+=2){
    let s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(o, s<0 ? s*0x8000 : s*0x7FFF, true);
  }
  return new Uint8Array(buffer);
}

function base64FromBytes(bytes){
  let binary = "";
  const chunk = 0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
  }
  return btoa(binary);
}

function playRec(i){
  if(quizData.questions[i].audio){
    new Audio(quizData.questions[i].audio).play();
  }
}

/* ===== HTML ===== */
function downloadHTML(){
  updateData();
  let html = "<h2>" + quizData.title + "</h2>";
  quizData.questions.forEach((s,i)=>{
    html += "<div>" + (s.text||"") + "</div>";
  });
  download(html,"checklista.html","text/html");

/* ===== JSON ===== */
function exportJSON(){
  updateData();
  download(JSON.stringify(quizData,null,2),"checklista.json","application/json");
}

function importJSON(){
  let input=document.createElement("input");
  input.type="file";
  input.onchange=e=>{
    let r=new FileReader();
    r.onload=()=>{
      try{
        const raw = JSON.parse(r.result);
        quizData = {
          title: raw.title || "",
          questions: (raw.questions || []).map(s => ({
            text:    s.text    || "",
            img:     s.img     || "",
            audio:   s.audio   || "",
            answer1: s.answer1 || "",
            answerX: s.answerX || "",
            answer2: s.answer2 || "",
            correct: s.correct || "1"
          }))
        };
        document.getElementById("title").value = quizData.title;
        render();
        alert("Quiz laddad!");
      }catch{
        alert("Ogiltig JSON-fil");
      }
    };
    r.readAsText(e.target.files[0]);
  };
  input.click();
}

/* ===== PREVIEW ===== */
function generatePreview(){
  updateData();
  let html="<h3>"+quizData.title+"</h3>";

  quizData.questions.forEach((q,i)=>{

    html += "<div class='section'>";
    html += "<b>Fråga "+(i+1)+"</b><br><br>";
    html += q.text+"<br><br>";

    html += "1. "+(q.answer1||"")+"<br>";
    html += "X. "+(q.answerX||"")+"<br>";
    html += "2. "+(q.answer2||"")+"<br><br>";

    html += "<span style='color:green'><b>Rätt svar: "+q.correct+"</b></span>";

    if(q.img){
      html += "<br><img src='"+q.img+"' style='max-height:100px;border-radius:8px'>";
    }

    html += "</div>";
  });

  document.getElementById("preview").innerHTML=html;
  document.getElementById("preview").style.display="block";
}

/* ===== DOWNLOAD ===== */
function download(data,name,type="text/plain"){
  const blob = new Blob([data],{type});
  const url = URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ===== QR KOD ===== */
function showQR(url, title) {
  document.getElementById('qr-h').textContent = title || 'QR-kod';
  document.getElementById('qr-u').textContent = url;
  document.getElementById('qr-modal').classList.add('on');
  var canvas = document.getElementById('qr-canvas');
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,200,200);
  function doQR() {
    var div = document.createElement('div');
    new QRCode(div, {text:url,width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(function(){
      var el = div.querySelector('canvas') || div.querySelector('img');
      if(!el) return;
      if(el.tagName==='CANVAS'){ ctx.drawImage(el,0,0,200,200); }
      else { var i=new Image(); i.onload=function(){ctx.drawImage(i,0,0,200,200);}; i.src=el.src; }
    }, 400);
  }
  if(typeof QRCode==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=doQR; document.head.appendChild(s);
  } else { doQR(); }
}

function dlQRpdf() {
  var title = document.getElementById('qr-h').textContent;
  var url   = document.getElementById('qr-u').textContent;
  var canvas = document.getElementById('qr-canvas');
  function build(Lib) {
    var doc = new Lib({orientation:'portrait',unit:'mm',format:'a4'});
    var W = doc.internal.pageSize.getWidth();
    doc.setFontSize(22); doc.setFont('helvetica','bold');
    doc.text(title, W/2, 30, {align:'center'});
    var sz=100, x=(W-sz)/2;
    doc.addImage(canvas.toDataURL('image/png'),'PNG',x,45,sz,sz);
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(100,100,100);
    doc.text(url, W/2, 158, {align:'center', maxWidth:W-30});
    doc.save((title.replace(/[^a-zA-Z0-9 ]/g,'_')||'qrkod')+'_QR.pdf');
  }
  function load(cb){
    if(typeof jsPDF!=='undefined'){cb(jsPDF);return;}
    if(window.jspdf){cb(window.jspdf.jsPDF);return;}
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){cb(window.jspdf?window.jspdf.jsPDF:jsPDF);};
    document.head.appendChild(s);
  }
  load(build);
}

/* ===== LADDA NER PDF ===== */
function downloadPDF(){
  updateData();
  if(!quizData.title && !quizData.questions.some(s=>s.text||s.img||s.answer1)){
    alert("Checklistan är tom.");return;
  }
  function getImgDims(dataUrl,maxW,maxH){
    return new Promise(function(resolve){
      var img=new Image();
      img.onload=function(){
        var w=img.naturalWidth,h=img.naturalHeight,ratio=w/h;
        if(w>maxW){w=maxW;h=w/ratio;}
        if(h>maxH){h=maxH;w=h*ratio;}
        resolve({w:Math.round(w),h:Math.round(h)});
      };
      img.onerror=function(){resolve({w:maxW,h:maxH});};
      img.src=dataUrl;
    });
  }
  function buildPDF(Lib){
    var doc=new Lib({orientation:"portrait",unit:"mm",format:"a4"});
    var pageW=doc.internal.pageSize.getWidth();
    var pageH=doc.internal.pageSize.getHeight();
    var margin=15,contentW=pageW-margin*2,y=margin;
    // Titel
    doc.setFillColor(245,245,245);
    doc.rect(0,0,pageW,22,"F");
    doc.setFontSize(18);doc.setFont("helvetica","bold");doc.setTextColor(40,40,40);
    doc.text(quizData.title||"Checklista",pageW/2,14,{align:"center"});
    y=28;
    var questions=quizData.questions.filter(function(s){return s.text||s.img||s.answer1;});
    var dimPromises=questions.map(function(s){
      if(!s.img)return Promise.resolve(null);
      return getImgDims(s.img,50,45);
    });
    Promise.all(dimPromises).then(function(dims){
      for(var i=0;i<questions.length;i++){
        var s=questions[i],dim=dims[i];
        var imgW=dim?dim.w:0,imgH=dim?dim.h:0;
        // Frågetext (fetstil), lämna plats för ev. bild till höger
        doc.setFontSize(12);doc.setFont("helvetica","bold");
        var qLines=doc.splitTextToSize((i+1)+". "+(s.text||""), contentW-(dim?imgW+6:0));
        var qH=qLines.length*6;
        // Svarsalternativ
        var opts=[];
        if(s.answer1) opts.push("1. "+s.answer1);
        if(s.answerX) opts.push("X. "+s.answerX);
        if(s.answer2) opts.push("2. "+s.answer2);
        var headH=Math.max(imgH,qH);
        var blockH=headH + opts.length*9 + 12;
        if(y+blockH>pageH-margin){doc.addPage();y=margin;}
        // Bild till höger
        if(s.img&&dim){
          try{doc.addImage(s.img,"JPEG",pageW-margin-imgW,y,imgW,imgH);}catch(e){}
        }
        // Frågetext
        doc.setFontSize(12);doc.setFont("helvetica","bold");doc.setTextColor(40,40,40);
        doc.text(qLines,margin,y+5);
        // Svarsalternativ med kryssruta
        var oy=y+headH+6;
        doc.setFontSize(11);doc.setFont("helvetica","normal");doc.setTextColor(40,40,40);
        for(var k=0;k<opts.length;k++){
          doc.setDrawColor(80,80,80);doc.setLineWidth(0.4);
          doc.roundedRect(margin,oy-4,5,5,1,1);
          var optLines=doc.splitTextToSize(opts[k],contentW-9);
          doc.text(optLines,margin+9,oy);
          oy+=Math.max(9,optLines.length*6);
        }
        y=oy+4;
        doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);
        doc.line(margin,y-2,pageW-margin,y-2);
        y+=4;
      }
      doc.setFontSize(8);doc.setTextColor(160,160,160);
      doc.text("Daglig Verksamhet – Digital Tipsrunda",pageW/2,pageH-8,{align:"center"});

      // ===== FACIT på egen sida =====
      var hasAnswers=questions.some(function(s){return s.answer1||s.answerX||s.answer2;});
      if(hasAnswers){
        doc.addPage();
        var fy=margin;
        doc.setFillColor(245,245,245);doc.rect(0,0,pageW,22,"F");
        doc.setFontSize(18);doc.setFont("helvetica","bold");doc.setTextColor(40,40,40);
        doc.text("Facit – "+(quizData.title||"Tipsrunda"),pageW/2,14,{align:"center"});
        fy=32;
        doc.setFontSize(12);doc.setFont("helvetica","normal");doc.setTextColor(40,40,40);
        for(var j=0;j<questions.length;j++){
          var fs=questions[j];
          var c=fs.correct||"1";
          var ans=c==="X"?fs.answerX:(c==="2"?fs.answer2:fs.answer1);
          var line=(j+1)+". Rätt svar: "+c+(ans?" – "+ans:"");
          var ll=doc.splitTextToSize(line,contentW);
          if(fy+ll.length*7>pageH-margin){doc.addPage();fy=margin;}
          doc.text(ll,margin,fy);
          fy+=ll.length*7+3;
        }
        doc.setFontSize(8);doc.setTextColor(160,160,160);
        doc.text("Daglig Verksamhet – Digital Tipsrunda (facit)",pageW/2,pageH-8,{align:"center"});
      }

      var name=(quizData.title||"checklista").replace(/[^a-zA-Z0-9 ]/g,"_");
      doc.save(name+".pdf");
    });
  }
  if(typeof jsPDF!=="undefined"){buildPDF(jsPDF);return;}
  if(window.jspdf){buildPDF(window.jspdf.jsPDF);return;}
  var s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  s.onload=function(){buildPDF(window.jspdf?window.jspdf.jsPDF:jsPDF);};
  document.head.appendChild(s);
}
</script>
